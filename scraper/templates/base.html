<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Graph-theory open problems{% endblock %}</title>
<link rel="stylesheet" href="{{ root }}static/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" integrity="sha384-43gviWU0YVjaDtb/GhzOouOXtZMP/7XUzwPTstBeZFe/+rCMvRwr4yROQP43s0Xk" crossorigin="anonymous" onload="renderMathInElement(document.body, {delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false},{left:'\\(',right:'\\)',display:false},{left:'\\[',right:'\\]',display:true}], throwOnError:false});"></script>
</head>
<body>
<header class="site-header">
  <a class="site-title" href="{{ root }}index.html">Graph-theory open problems</a>
  <nav>
    <a href="{{ root }}index.html">All problems</a>
    <a href="{{ root }}timeline/">Timeline</a>
    <a href="{{ root }}about/">About</a>
  </nav>
</header>

<main>
{% block main %}{% endblock %}
</main>

<footer class="site-footer">
  <p>Built {{ build_date }} from <a href="http://www.openproblemgarden.org/category/graph_theory">openproblemgarden.org/category/graph_theory</a> ({{ problem_count }} problems). Content is licensed under the <a href="https://www.gnu.org/licenses/fdl-1.2.html">GNU Free Documentation License</a>.</p>
</footer>
</body>
</html>
